services:
  submerge:
    image: ghcr.io/b4stoss/submerge:latest
    # Or build locally: build: .
    container_name: submerge
    environment:
      # REQUIRED: Language pairs to generate
      # Format: "lang_bottom-lang_top,..."
      # Examples:
      #   "fr-pl,en-pl"     -> generates .fr-pl.ass and .en-pl.ass
      #   "de-en"           -> generates .de-en.ass
      #   "ja-en,fr-en"     -> generates .ja-en.ass and .fr-en.ass
      SUBTOOLS_PAIRS: "fr-pl,en-pl"

      # OPTIONAL: Subtitle appearance
      SUBTOOLS_COLOR_BOTTOM: "#FFFFFF"   # White (bottom language)
      SUBTOOLS_COLOR_TOP: "#FFFF00"      # Yellow (top language)
      SUBTOOLS_FONTSIZE: "18"            # Font size

      # OPTIONAL: Layout
      # - "top-bottom": one language at top, one at bottom (default)
      # - "stacked":    both at bottom, one above the other
      SUBTOOLS_LAYOUT: "top-bottom"
    volumes:
      # IMPORTANT: Path must match Bazarr's media path
      - /path/to/media:/data
    ports:
      - 8282:8282
    restart: unless-stopped
    # Uncomment to join Bazarr's network:
    # networks:
    #   - media
