{% extends "base.html" %}
{% block title %}Settings{% endblock %}

{% block content %}
<div class="page-header">
    <h1>Settings</h1>
</div>

<div class="settings-container">
    <form id="settingsForm" class="settings-form">
        <div class="form-group">
            <label for="pairs">Language Pairs</label>
            <input type="text" id="pairs" name="pairs" value="{{ settings.pairs_raw }}"
                   placeholder="de-ko,en-de" required>
            <small>Format: lang1-lang2,lang3-lang4 (bottom-top order)</small>
        </div>

        <div class="form-group">
            <label for="mediaRoot">Media Root Directory</label>
            <input type="text" id="mediaRoot" name="media_root" value="{{ settings.media_root }}"
                   placeholder="/data">
        </div>

        <div class="form-group">
            <label for="pollInterval">Poll Interval (seconds)</label>
            <input type="number" id="pollInterval" name="poll_interval" value="{{ settings.poll_interval }}"
                   min="10" max="3600">
        </div>

        <fieldset>
            <legend>Appearance</legend>

            <div class="form-row">
                <div class="form-group">
                    <label for="colorBottom">Bottom Color</label>
                    <input type="color" id="colorBottom" name="bottom_color" value="{{ settings.bottom_color }}">
                </div>
                <div class="form-group">
                    <label for="colorTop">Top Color</label>
                    <input type="color" id="colorTop" name="top_color" value="{{ settings.top_color }}">
                </div>
            </div>

            <div class="form-row">
                <div class="form-group">
                    <label for="fontsize">Font Size</label>
                    <input type="number" id="fontsize" name="bottom_fontsize" value="{{ settings.bottom_fontsize }}"
                           min="8" max="72">
                </div>
                <div class="form-group">
                    <label for="layout">Layout</label>
                    <select id="layout" name="layout">
                        <option value="top-bottom" {% if settings.layout == 'top-bottom' %}selected{% endif %}>Top-Bottom</option>
                        <option value="stacked" {% if settings.layout == 'stacked' %}selected{% endif %}>Stacked</option>
                    </select>
                </div>
            </div>
        </fieldset>

        <div id="settingsStatus" class="status-msg hidden"></div>
        <button type="submit" class="btn btn-primary">Save Settings</button>
    </form>

    <div>
        <div class="settings-info">
            <h2>Active Polling Jobs</h2>
            <div id="activePolls">
                <span class="loading-text">Loading...</span>
            </div>
        </div>

        <div class="settings-info schedule-section" style="margin-top:16px">
            <h2>Auto-Merge Schedule</h2>
            <form id="scheduleForm">
                <div class="form-group">
                    <label class="checkbox-label">
                        <input type="checkbox" id="autoMergeEnabled" name="auto_merge_enabled">
                        Enable daily auto-merge
                    </label>
                </div>

                <div class="form-row">
                    <div class="form-group">
                        <label for="scheduleTime">Run daily at</label>
                        <input type="time" id="scheduleTime" name="schedule_time" value="03:00" step="60">
                    </div>
                    <div class="form-group">
                        <label for="scheduleTemplate">Template</label>
                        <select id="scheduleTemplate" name="schedule_template">
                            <option value="">(Default template)</option>
                        </select>
                    </div>
                </div>

                <div class="form-group">
                    <label class="checkbox-label">
                        <input type="checkbox" id="runOnStartup" name="run_on_startup">
                        Run once when container starts
                    </label>
                </div>

                <span id="scheduleStatus" class="schedule-hint">Loading...</span>
                <button type="submit" class="btn btn-primary" style="margin-top:8px">Save Schedule</button>
            </form>
        </div>
    </div>
</div>
{% endblock %}

{% block scripts %}
<script>
document.addEventListener('DOMContentLoaded', () => {
    document.getElementById('settingsForm').addEventListener('submit', async (e) => {
        e.preventDefault();
        const formData = new FormData(e.target);
        const data = Object.fromEntries(formData.entries());
        try {
            const resp = await fetch('/api/settings', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify(data),
            });
            const result = await resp.json();
            showSettingsStatus(result.status === 'ok' ? 'Settings applied (runtime only)' : result.message, result.status);
        } catch (err) {
            showSettingsStatus('Failed: ' + err.message, 'error');
        }
    });

    // --- Schedule form ---
    const enabledCb   = document.getElementById('autoMergeEnabled');
    const timeInput   = document.getElementById('scheduleTime');
    const startupCb   = document.getElementById('runOnStartup');
    const tmplSelect  = document.getElementById('scheduleTemplate');
    const scheduleForm = document.getElementById('scheduleForm');

    function setDisabledState() {
        const d = !enabledCb.checked;
        timeInput.disabled = d;
        startupCb.disabled = d;
    }
    enabledCb.addEventListener('change', setDisabledState);

    scheduleForm.addEventListener('submit', async (e) => {
        e.preventDefault();
        const data = {
            auto_merge_enabled: enabledCb.checked,
            schedule_time: timeInput.value,
            run_on_startup: startupCb.checked,
            schedule_template: tmplSelect.value,
        };
        try {
            const resp = await fetch('/api/settings/schedule', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify(data),
            });
            const result = await resp.json();
            if (result.status === 'ok') {
                updateScheduleStatus(result.settings);
                scheduleStatus.className = 'schedule-hint schedule-ok';
                scheduleStatus.textContent = 'Saved ✓';
                setTimeout(() => updateScheduleStatus(result.settings), 2000);
            } else {
                scheduleStatus.className = 'schedule-hint schedule-error';
                scheduleStatus.textContent = result.message || 'Save failed';
            }
        } catch (err) {
            scheduleStatus.className = 'schedule-hint schedule-error';
            scheduleStatus.textContent = 'Failed: ' + err.message;
        }
    });

    loadPolls();
    setInterval(loadPolls, 10000);
    loadSchedule();
    loadPresets();
});

async function loadSchedule() {
    const statusEl = document.getElementById('scheduleStatus');
    try {
        const resp = await fetch('/api/settings/schedule');
        const s = await resp.json();
        document.getElementById('autoMergeEnabled').checked = s.auto_merge_enabled;
        document.getElementById('scheduleTime').value = s.schedule_time;
        document.getElementById('runOnStartup').checked = s.run_on_startup;
        document.getElementById('scheduleTemplate').value = s.schedule_template;
        setDisabledState();
        updateScheduleStatus(s);
    } catch (e) {
        statusEl.className = 'schedule-hint schedule-error';
        statusEl.textContent = 'Failed to load schedule settings';
    }
}

function updateScheduleStatus(s) {
    const el = document.getElementById('scheduleStatus');
    el.className = 'schedule-hint';
    if (!s.auto_merge_enabled) {
        el.textContent = 'Auto-merge is disabled';
    } else {
        el.textContent = 'Next job: daily at ' + s.schedule_time
            + (s.schedule_template ? '  ·  template: ' + s.schedule_template : '')
            + (s.run_on_startup ? '  ·  also on startup' : '');
    }
}

async function loadPresets() {
    try {
        const resp = await fetch('/api/presets');
        const data = await resp.json();
        const sel = document.getElementById('scheduleTemplate');
        data.presets.forEach(p => {
            const opt = document.createElement('option');
            opt.value = p.name;
            opt.textContent = p.name;
            sel.appendChild(opt);
        });
    } catch (e) { /* ignore */ }
}

async function loadPolls() {
    try {
        const resp = await fetch('/api/polls');
        const data = await resp.json();
        const el = document.getElementById('activePolls');
        if (data.polls && data.polls.length > 0) {
            el.innerHTML = '<ul>' + data.polls.map(p => '<li>' + p + '</li>').join('') + '</ul>';
        } else {
            el.innerHTML = '<span class="empty-text">No active polling jobs</span>';
        }
    } catch (e) {
        document.getElementById('activePolls').innerHTML = '<span class="error-text">Failed to load</span>';
    }
}

function setDisabledState() {
    const enabled = document.getElementById('autoMergeEnabled').checked;
    document.getElementById('scheduleTime').disabled = !enabled;
    document.getElementById('runOnStartup').disabled = !enabled;
}

function showSettingsStatus(msg, type) {
    const el = document.getElementById('settingsStatus');
    el.textContent = msg;
    el.className = 'status-msg status-' + (type === 'ok' ? 'success' : type);
    setTimeout(() => el.classList.add('hidden'), 4000);
}
</script>
{% endblock %}
